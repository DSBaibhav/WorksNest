{% extends 'blog/base.html' %}
{% load crispy_forms_tags %}
{% block title %}Login · WYTs{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="post-card p-4 text-center">
      <h2 style="font-family:'Playfair Display',serif; margin-bottom:1.5rem;">Welcome back</h2>
      <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn btn-accent w-100 mt-3">Login</button>
      </form>
      <p class="text-muted mt-3" style="font-size:0.9rem;">
        Don't have an account? Ask your admin to create one via the
        <a href="/admin/" style="color:var(--accent)">admin panel</a>.
      </p>
    </div>
  </div>
</div>
{% endblock %}
