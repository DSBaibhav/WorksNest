{% extends 'blog/base.html' %}
{% block title %}Delete Post · WYTs{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="post-card p-4 text-center">
      <i class="fa fa-exclamation-triangle fa-3x text-danger mb-3"></i>
      <h4>Delete this post?</h4>
      <p class="text-muted">Are you sure you want to delete <strong>"{{ object.title }}"</strong>? This cannot be undone.</p>
      <form method="POST" class="d-flex justify-content-center gap-3 mt-3">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger rounded-pill px-4">Yes, delete it</button>
        <a href="{% url 'post-detail' object.pk %}" class="btn btn-outline-secondary rounded-pill px-4">Cancel</a>
      </form>
    </div>
  </div>
</div>
{% endblock %}
