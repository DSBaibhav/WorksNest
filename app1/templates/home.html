<!DOCTYPE html>
<html>
<head>
    <title>Todo App</title>
</head>
<body>

<h1>My Todo List 🚀</h1>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="title" placeholder="Enter task">
    <input type="date" name="due_date">
    <button type="submit">Add</button>
</form>

<ul>
    {% for todo in todos %}
        <li>
           {% if todo.completed %}
           <strike>{{ todo.title }}</strike>
           {% else %}
           {{ todo.title }}
           {% endif %}
           <a href="toggle/{{ todo.id }}">✅</a>
           <a href="delete/{{ todo.id }}">❌</a>
           <a href="edit/{{ todo.id }}">✏️</a>
           <a href="due_date/{{ todo.due_date }}">🗓️</a>
           <a href="clear/">Clear All</a>
      </li>
   {% endfor %}
</ul>
<input type="date" name="due_date">
<form method="GET">
    <input type="text" name="q" placeholder="Search tasks">
    <button type="submit">Search</button>
</form>
<style>
body {
    font-family: Arial;
    background: #f5f5f5;
}

h1 {
    color: #333;
}

li {
    background: white;
    padding: 10px;
    margin: 5px;
    list-style: none;
}
</style>
</body>
</html>
