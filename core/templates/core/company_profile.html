{% extends 'core/base.html' %}
{% block title %}Company Profile — WorksNest{% endblock %}
{% block content %}
<style>
  .form-page { max-width: 700px; margin: 3rem auto; padding: 0 2rem; }
  .form-card { background: var(--navy-2); border: 1px solid rgba(255,255,255,0.06); border-radius: var(--radius); padding: 2.5rem; }
  .form-title { font-family: var(--font-heading); font-size: 1.8rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 0.4rem; }
  .form-subtitle { color: var(--gray-400); margin-bottom: 2rem; font-size: 0.95rem; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }
</style>
<div class="form-page">
  <div class="form-card">
    <div class="form-title">🏢 Company Profile</div>
    <div class="form-subtitle">Help candidates learn about your company</div>
    <form method="POST" enctype="multipart/form-data">
      {% csrf_token %}
      <div class="form-group">
        <label>Company Name *</label>
        <input type="text" name="name" value="{{ company.name }}" required />
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea name="description" rows="4" placeholder="What does your company do?">{{ company.description }}</textarea>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Industry</label>
          <input type="text" name="industry" value="{{ company.industry }}" placeholder="e.g. Technology, Finance" />
        </div>
        <div class="form-group">
          <label>Company Size</label>
          <input type="text" name="size" value="{{ company.size }}" placeholder="e.g. 10-50, 100-500" />
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Location</label>
          <input type="text" name="location" value="{{ company.location }}" placeholder="City, Country" />
        </div>
        <div class="form-group">
          <label>Founded Year</label>
          <input type="number" name="founded" value="{{ company.founded|default:'' }}" placeholder="e.g. 2018" />
        </div>
      </div>
      <div class="form-group">
        <label>Website</label>
        <input type="url" name="website" value="{{ company.website }}" placeholder="https://yourcompany.com" />
      </div>
      <div class="form-group">
        <label>Company Logo</label>
        <input type="file" name="logo" accept="image/*" />
        {% if company.logo %}<small style="color:var(--gray-400);font-size:0.8rem">Current logo is set</small>{% endif %}
      </div>
      <div style="display:flex;gap:1rem;margin-top:1.5rem">
        <button type="submit" class="btn btn-primary">Save Company Profile</button>
        <a href="{% url 'dashboard' %}" class="btn btn-ghost">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
